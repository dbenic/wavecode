  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" stroke="#34d399" stroke-opacity="0.3"/>
  <!-- W mark — simplified from Wavenetic favicon -->
  <path d="M7.5 21.5H5L8.5 8.5H11L13.8 18.5L16.5 8.5H19L21.8 18.5L23.5 13H26.5L23.5 23.5H20.8L18 15.5L15.2 23.5H12.5L9.7 15.5L7.5 21.5Z" fill="#34d399"/>
